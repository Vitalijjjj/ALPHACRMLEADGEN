name: Send Reminders

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger reminders endpoint
        run: |
          curl -sf "https://alphacrmleadgen.vercel.app/api/reminders" \
            || echo "Reminders request failed"
